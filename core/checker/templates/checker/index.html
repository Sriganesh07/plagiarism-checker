<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Plagiarism Engine</title>
    <style>
        :root {
            --bg-color: #f4f7fa;
            --card-bg: #ffffff;
            --primary: #2f3542;
            --accent: #5352ed;
            --text-main: #2f3542;
            --text-light: #747d8c;
        }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-light);
            font-size: 1.1rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 1.2rem;
            border: 2px solid #dfe4ea;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
            background-color: #f8f9fa;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
            background-color: #ffffff;
        }

        .btn-submit {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            align-self: flex-end;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(83, 82, 237, 0.3);
        }

        /* Results Section Styling */
        .results-panel {
            border-top: 4px solid var(--accent);
        }

        .score-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #dfe4ea;
            margin-bottom: 1.5rem;
        }

        .similarity-score {
            font-size: 4rem;
            font-weight: 800;
            margin: 0;
            line-height: 1;
        }

        .risk-badge {
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .match-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .matched-text {
            background-color: #f1f2f6;
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid #ced6e0;
            font-style: italic;
            color: #57606f;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Abstract Similarity Engine</h1>
            <p>Check new submissions against the global project database.</p>
        </div>

        <div class="card">
            <form method="POST" class="input-group">
                {% csrf_token %}
                <label for="abstract" style="font-weight: 600; font-size: 1.1rem;">Submit New Abstract:</label>
                <textarea 
                    name="abstract" 
                    id="abstract" 
                    required 
                    placeholder="Paste the project abstract here (e.g., Plasmonic resonance techniques for early cancer detection, or Design of an 8-bit carry lookahead adder)..."
                ></textarea>
                <button type="submit" class="btn-submit">Analyze & Save to Database</button>
            </form>
        </div>

        {% if similarity_score is not None %}
        <div class="card results-panel" style="border-top-color: {{ color_theme }};">
            <div class="score-container">
                <div>
                    <p class="match-label">Highest Similarity Detected</p>
                    <h2 class="similarity-score" style="color: {{ color_theme }};">{{ similarity_score }}%</h2>
                </div>
                <div class="risk-badge" style="background-color: {{ color_theme }};">
                    {{ risk_level }}
                </div>
            </div>

            <div>
                <p class="match-label">Matched Against Existing Record:</p>
                <div class="matched-text">
                    "{{ best_match }}"
                </div>
            </div>
        </div>
        {% endif %}

    </div>

</body>
</html>
